services:
  - type: web
    name: smartbuy-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: smartbuy-uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://smartbuy.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAIL_SERVICE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM_NAME
        value: SmartBuy
      - key: MAIL_FROM_EMAIL
        sync: false

  - type: web
    name: smartbuy
    runtime: static
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smartbuy-api.onrender.com
